<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#fbcfe8"/>
    </linearGradient>
    <linearGradient id="text" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9a8d4"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#be185d"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g filter="url(#glow)">
    <text x="600" y="370" text-anchor="middle" font-family="'Archivo Black', Impact, sans-serif" font-size="220" font-weight="900" fill="url(#text)" stroke="#831843" stroke-width="5">BARBIE</text>
  </g>
  <text x="600" y="500" text-anchor="middle" font-family="Inter, sans-serif" font-size="32" fill="#9d174d">Barbie pink 3D text · transparent background PNG</text>
</svg>
